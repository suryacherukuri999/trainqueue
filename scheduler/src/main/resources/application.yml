spring:
  main:
    web-application-type: none
  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://localhost:27017/trainqueue
  elasticsearch:
    uris: http://localhost:9200
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: scheduler
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

trainqueue:
  topics:
    submitted: jobs.submitted
    status: jobs.status
    control: jobs.control
  api:
    base-url: http://localhost:8080
    key: ${TRAINQUEUE_API_KEY:dev-key}
  pool:
    cpu-millis: 4000
    mem-mb: 8192
  retry:
    base-backoff-ms: 2000
    max-backoff-ms: 30000
  heartbeat-ms: 10000
  output-dir: /tmp/trainqueue-output
  s3:
    endpoint: http://localhost:4566
    region: us-east-1
    bucket: trainqueue-artifacts
    access-key: test
    secret-key: test
  es:
    index: job-logs
    flush-count: 50
    flush-ms: 2000
    spool-file: /tmp/trainqueue-es-spool.ndjson
