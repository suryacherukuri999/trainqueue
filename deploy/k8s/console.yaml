apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  labels: { app: trainqueue, component: console }
spec:
  replicas: 1
  selector:
    matchLabels: { app: trainqueue, component: console }
  template:
    metadata:
      labels: { app: trainqueue, component: console }
    spec:
      containers:
        - name: console
          image: ghcr.io/suryacherukuri999/trainqueue-console:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: console
  labels: { app: trainqueue, component: console }
spec:
  type: NodePort
  selector: { app: trainqueue, component: console }
  ports:
    - port: 80
      targetPort: 80
