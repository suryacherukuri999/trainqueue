name: ci

on:
  push:
  pull_request:

jobs:
  java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, scheduler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: build + test
        working-directory: ${{ matrix.service }}
        run: ./mvnw -B -ntp verify

  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, console]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - working-directory: ${{ matrix.service }}
        run: |
          npm ci
          npm test
          npm run build

  images:
    needs: [java, node]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, scheduler, gateway, console, worker-sim]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/trainqueue-${{ matrix.service }}:latest
