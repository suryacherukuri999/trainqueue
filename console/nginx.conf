server {
    listen 80;
    server_name _;

    # SPA: serve static files, fall back to index.html for client-side routes
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # proxy the REST API to the api service (same origin for the browser)
    location /api/ {
        proxy_pass http://api:8080/api/;
    }

    # proxy the live WebSocket stream to the gateway
    location /ws {
        proxy_pass http://gateway:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
