apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels: { app: trainqueue, component: gateway }
spec:
  replicas: 1
  selector:
    matchLabels: { app: trainqueue, component: gateway }
  template:
    metadata:
      labels: { app: trainqueue, component: gateway }
    spec:
      containers:
        - name: gateway
          image: ghcr.io/suryacherukuri999/trainqueue-gateway:latest
          ports:
            - containerPort: 8081
          env:
            - { name: REDIS_URL, value: "redis://redis:6379" }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels: { app: trainqueue, component: gateway }
spec:
  selector: { app: trainqueue, component: gateway }
  ports:
    - port: 8081
      targetPort: 8081
