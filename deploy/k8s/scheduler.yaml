# Scheduler runs in-cluster and launches worker-sim as K8s Jobs (LAUNCHER=k8s),
# so it needs RBAC to manage Jobs/Pods in the namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scheduler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scheduler-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scheduler-jobs
subjects:
  - kind: ServiceAccount
    name: scheduler
roleRef:
  kind: Role
  name: scheduler-jobs
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  labels: { app: trainqueue, component: scheduler }
spec:
  replicas: 1
  selector:
    matchLabels: { app: trainqueue, component: scheduler }
  template:
    metadata:
      labels: { app: trainqueue, component: scheduler }
    spec:
      serviceAccountName: scheduler
      containers:
        - name: scheduler
          image: ghcr.io/suryacherukuri999/trainqueue-scheduler:latest
          env:
            - { name: LAUNCHER, value: "k8s" }
            - { name: SPRING_KAFKA_BOOTSTRAP_SERVERS, value: "kafka:9092" }
            - { name: SPRING_DATA_REDIS_HOST, value: "redis" }
            - { name: SPRING_DATA_MONGODB_URI, value: "mongodb://mongodb:27017/trainqueue" }
            - { name: SPRING_ELASTICSEARCH_URIS, value: "http://elasticsearch:9200" }
            - { name: TRAINQUEUE_API_BASE_URL, value: "http://api:8080" }
            - { name: TRAINQUEUE_S3_ENDPOINT, value: "http://localstack:4566" }
            - name: TRAINQUEUE_API_KEY
              valueFrom: { secretKeyRef: { name: trainqueue, key: api-key } }
