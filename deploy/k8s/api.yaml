apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: { app: trainqueue, component: api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: trainqueue, component: api }
  template:
    metadata:
      labels: { app: trainqueue, component: api }
    spec:
      containers:
        - name: api
          image: ghcr.io/suryacherukuri999/trainqueue-api:latest
          ports:
            - containerPort: 8080
          env:
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres:5432/trainqueue" }
            - { name: SPRING_KAFKA_BOOTSTRAP_SERVERS, value: "kafka:9092" }
            - { name: SPRING_DATA_REDIS_HOST, value: "redis" }
            - { name: SPRING_DATA_MONGODB_URI, value: "mongodb://mongodb:27017/trainqueue" }
            - { name: SPRING_ELASTICSEARCH_URIS, value: "http://elasticsearch:9200" }
            - { name: TRAINQUEUE_S3_ENDPOINT, value: "http://localstack:4566" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels: { app: trainqueue, component: api }
spec:
  selector: { app: trainqueue, component: api }
  ports:
    - port: 8080
      targetPort: 8080
