services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: trainqueue
      POSTGRES_USER: trainqueue
      POSTGRES_PASSWORD: trainqueue
    ports:
      # host 5433 -> container 5432: avoids clashing with a local Postgres on 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainqueue -d trainqueue"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.8.1
    ports:
      - "9092:9092"
    environment:
      # single-node KRaft: this node is both broker and controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # api/scheduler run on the host, so advertise the host-reachable address
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  elasticsearch:
    image: elasticsearch:8.13.4
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  # --- application services (opt-in): `docker compose --profile app up --build` ---
  # build-only helper: tags worker-sim:latest so the scheduler can launch it via the
  # docker socket. It has no long-running role, so it just exits 0 after the build.
  worker-sim:
    build: ./worker-sim
    image: worker-sim:latest
    profiles: ["app"]
    entrypoint: ["true"]
    restart: "no"

  api:
    build: ./api
    profiles: ["app"]
    ports: ["8080:8080"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trainqueue
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/trainqueue
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      TRAINQUEUE_S3_ENDPOINT: http://localstack:4566
      # presigned artifact URLs are opened by the browser on the host, where LocalStack
      # is published on localhost:4566 (not the in-network "localstack" hostname)
      TRAINQUEUE_S3_PUBLIC_ENDPOINT: http://localhost:4566
      TRAINQUEUE_DEFAULT_IMAGE: worker-sim:latest
      TRAINQUEUE_API_KEY: dev-key
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }

  scheduler:
    build: ./scheduler
    profiles: ["app"]
    environment:
      LAUNCHER: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/trainqueue
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      TRAINQUEUE_API_BASE_URL: http://api:8080
      TRAINQUEUE_API_KEY: dev-key
      TRAINQUEUE_S3_ENDPOINT: http://localstack:4566
      TRAINQUEUE_OUTPUT_DIR: /tmp/trainqueue-output
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/trainqueue-output:/tmp/trainqueue-output
    depends_on:
      api: { condition: service_started }
      # ensure worker-sim:latest is built before any job is launched
      worker-sim: { condition: service_completed_successfully }

  gateway:
    build: ./gateway
    profiles: ["app"]
    ports: ["8081:8081"]
    environment:
      REDIS_URL: redis://redis:6379

  console:
    build:
      context: ./console
      args:
        # baked-in at build; matches the api/scheduler dev key
        VITE_API_KEY: dev-key
    profiles: ["app"]
    ports: ["5173:80"]
    depends_on: [api, gateway]

volumes:
  pgdata:
  mongodata:
